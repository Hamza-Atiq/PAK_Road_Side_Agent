name: Build & Distribute Android APK

# Builds a signed release APK on every push to master that touches the mobile
# app, then publishes it to BOTH a GitHub Release and Firebase App Distribution.
# Testers on Firebase get an automatic email with a download link.

on:
  push:
    branches: [master]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/android-distribute.yml"
  workflow_dispatch: # lets you trigger a build manually from the Actions tab

permissions:
  contents: write # required to create GitHub Releases

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Decode release keystore
        working-directory: apps/mobile/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Create key.properties
        working-directory: apps/mobile/android
        run: |
          {
            echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "storeFile=../upload-keystore.jks"
          } > key.properties

      - name: Build signed release APK (universal)
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Compute version tag
        id: version
        run: echo "tag=v$(date +%Y.%m.%d)-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RoadSide Agent ${{ steps.version.outputs.tag }}
          body: |
            Automated build from commit ${{ github.sha }}.
            Install the APK below on your Android phone (enable "Install unknown apps" if prompted).
          files: apps/mobile/build/app/outputs/flutter-apk/app-release.apk

      # Only runs once you've added the Firebase secrets. Until then the
      # workflow still succeeds with just the GitHub Release above.
      - name: Distribute to Firebase App Distribution
        if: ${{ env.FIREBASE_ANDROID_APP_ID != '' }}
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Automated build ${{ steps.version.outputs.tag }} from commit ${{ github.sha }}.
