org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Plugin Java tasks default to 11 while Kotlin tasks are now 17. AGP sets Java
# via its own DSL which we cannot reach from the root build script without
# fragile reflection. Downgrade the validation to a warning so the build
# proceeds. (Official Kotlin Gradle plugin flag.)
kotlin.jvm.target.validation.mode=warning
# Disable Kotlin incremental compilation. The .tab cache files in
# build/<plugin>/kotlin/compileDebugKotlin/cacheable/ get re-registered
# across daemon-shared sessions, throwing "Storage already registered".
# Cost: slightly slower clean builds; benefit: reliable builds.
kotlin.incremental=false
# Run each Kotlin compile in the Gradle worker JVM (not a shared daemon).
# Guarantees fresh state per task — no stale FilePageCache leaks.
kotlin.compiler.execution.strategy=in-process
