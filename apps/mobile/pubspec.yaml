name: roadside_mobile
description: RoadSide — customer mobile app (Flutter).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^3.0.1

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.2.3

  # Location + GPS
  geolocator: ^14.0.2
  permission_handler: ^12.0.3

  # Camera + media
  image_picker: ^1.1.2
  record: ^7.0.0

  # Push (FCM for Android + iOS via APNs bridge)
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Map (OSM tiles, free)
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Misc
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0

  # Social sign-on (Apple required for App Store; Google + Facebook for parity)
  sign_in_with_apple: ^8.1.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
