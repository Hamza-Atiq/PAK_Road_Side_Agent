# SPA-only Nginx server block for the Customer panel.
# The reverse proxy at the edge (infrastructure/nginx/nginx.conf) terminates
# TLS and routes /api and /ws to the backend; this internal server just serves
# the static bundle.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm application/xml text/xml image/svg+xml;

    # Cache hashed bundle assets aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — react-router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
