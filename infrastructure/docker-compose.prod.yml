# ============================================================
# RoadSide Agent — Production Compose
# Usage:
#   docker compose -f infrastructure/docker-compose.yml \
#                  -f infrastructure/docker-compose.prod.yml \
#                  --env-file .env.prod up -d --build
#
# Differences from the dev compose:
#   * No source bind mounts — images contain the built artifacts.
#   * Resource limits on every service.
#   * Postgres / Redis ports NOT exposed to the host — internal network only.
#   * 3 frontend SPAs (customer / provider / admin) + edge nginx reverse proxy.
#   * Prometheus retention set to 30d.
#   * Pinned restart policies + log rotation.
# ============================================================

name: roadside-prod

x-log-defaults: &log_defaults
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ------------------------------------------------------------
  # PostgreSQL — no host port exposed in prod
  # ------------------------------------------------------------
  postgres:
    restart: always
    ports: !reset []
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-postgis.sql:/docker-entrypoint-initdb.d/01-init-postgis.sql:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 512m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Redis — no host port exposed
  # ------------------------------------------------------------
  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging: *log_defaults

  # ------------------------------------------------------------
  # API — no source mounts, behind the edge nginx
  # ------------------------------------------------------------
  api:
    restart: always
    ports: !reset []
    volumes: !reset
      - uploads_data:/app/uploads
    environment:
      APP_ENV: production
      DEBUG: "false"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --no-access-log"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    logging: *log_defaults

  # ------------------------------------------------------------
  # Celery worker (scale this horizontally via --scale celery=N)
  # ------------------------------------------------------------
  celery:
    restart: always
    volumes: !reset
      - uploads_data:/app/uploads
    environment:
      APP_ENV: production
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
    logging: *log_defaults

  # ------------------------------------------------------------
  # Celery beat (singleton — never scale beyond 1)
  # ------------------------------------------------------------
  celery-beat:
    restart: always
    volumes: !reset []
    environment:
      APP_ENV: production
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Customer SPA
  # ------------------------------------------------------------
  frontend-customer:
    build:
      context: ../frontend/customer
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${PUBLIC_WS_BASE_URL:-}
    container_name: roadside-frontend-customer
    restart: always
    networks:
      - roadside-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Provider SPA
  # ------------------------------------------------------------
  frontend-provider:
    build:
      context: ../frontend/provider
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${PUBLIC_WS_BASE_URL:-}
    container_name: roadside-frontend-provider
    restart: always
    networks:
      - roadside-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Admin SPA
  # ------------------------------------------------------------
  frontend-admin:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
        VITE_WS_BASE_URL: ${PUBLIC_WS_BASE_URL:-}
        VITE_GRAFANA_EMBED_URL: ${PUBLIC_GRAFANA_EMBED_URL:-}
    container_name: roadside-frontend-admin
    restart: always
    networks:
      - roadside-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Edge nginx — TLS termination + reverse proxy + per-host routing
  # Vhosts:
  #   customer.<domain>  -> frontend-customer
  #   provider.<domain>  -> frontend-provider
  #   admin.<domain>     -> frontend-admin
  #   api.<domain>       -> api (8000) + /ws WebSocket upgrade
  # ------------------------------------------------------------
  edge:
    image: nginx:1.27-alpine
    container_name: roadside-edge
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api
      - frontend-customer
      - frontend-provider
      - frontend-admin
    networks:
      - roadside-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256m
    logging: *log_defaults

  # ------------------------------------------------------------
  # Prometheus — 30-day retention
  # ------------------------------------------------------------
  prometheus:
    restart: always
    ports: !reset []  # not exposed publicly; admin reaches via edge proxy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    logging: *log_defaults

  # ------------------------------------------------------------
  # Grafana
  # ------------------------------------------------------------
  grafana:
    restart: always
    ports: !reset []
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in prod}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    logging: *log_defaults

volumes:
  uploads_data:
