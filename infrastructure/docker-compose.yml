# ============================================================
# RoadSide Agent — Local Development Stack
# Usage: docker compose -f infrastructure/docker-compose.yml --env-file .env up -d
# ============================================================

name: roadside

services:

  # ------------------------------------------------------------
  # PostgreSQL 16 + PostGIS 3.4
  # ------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: roadside-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roadside}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadside}
      POSTGRES_DB: ${POSTGRES_DB:-roadside}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-postgis.sql:/docker-entrypoint-initdb.d/01-init-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roadside} -d ${POSTGRES_DB:-roadside}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # Redis 7 (Celery broker + result backend)
  # ------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: roadside-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # FastAPI backend
  # ------------------------------------------------------------
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: roadside-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadside}:${POSTGRES_PASSWORD:-roadside}@postgres:5432/${POSTGRES_DB:-roadside}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-roadside}:${POSTGRES_PASSWORD:-roadside}@postgres:5432/${POSTGRES_DB:-roadside}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # Celery worker (runs agent tasks)
  # ------------------------------------------------------------
  celery:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: roadside-celery
    restart: unless-stopped
    command: celery -A celery_worker worker --loglevel=info --concurrency=4 -Q incidents,notifications,monitoring
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-roadside}:${POSTGRES_PASSWORD:-roadside}@postgres:5432/${POSTGRES_DB:-roadside}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ../backend:/app
      - ../uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # Celery beat (scheduled tasks — TrackingAgent every 60s)
  # ------------------------------------------------------------
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: roadside-celery-beat
    restart: unless-stopped
    command: celery -A celery_worker beat --loglevel=info
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # Prometheus
  # ------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: roadside-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - roadside-net

  # ------------------------------------------------------------
  # Grafana
  # ------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: roadside-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - roadside-net

# ------------------------------------------------------------
# Networks & volumes
# ------------------------------------------------------------
networks:
  roadside-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
