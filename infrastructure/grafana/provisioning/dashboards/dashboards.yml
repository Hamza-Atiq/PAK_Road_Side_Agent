# Grafana provisioning — auto-load dashboards from /var/lib/grafana/dashboards
apiVersion: 1

providers:
  - name: "roadside"
    orgId: 1
    folder: "RoadSide"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
