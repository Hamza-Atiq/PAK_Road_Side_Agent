# Plain HTTP server: serve the ACME challenge path for Let's Encrypt cert
# renewals, redirect everything else to HTTPS.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt HTTP-01 challenge (mount certbot's webroot into this path).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
