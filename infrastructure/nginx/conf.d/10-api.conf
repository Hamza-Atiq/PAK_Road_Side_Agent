# api.<domain> — FastAPI backend + WebSocket upgrades.

server {
    listen 443 ssl;
    http2 on;
    server_name api.${SERVER_DOMAIN};

    ssl_certificate     /etc/nginx/certs/${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/${SERVER_DOMAIN}/privkey.pem;

    include /etc/nginx/conf.d/common-security.conf;

    # ---------- /api → FastAPI ----------
    location /api/ {
        limit_req zone=api_general burst=40 nodelay;

        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        proxy_buffering       off;
    }

    # Auth endpoints get a tighter rate limit (defense in depth with slowapi)
    location ~ ^/api/auth/(login|register|verify-otp)$ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- /ws → WebSockets ----------
    location /ws/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 1h;            # long-lived connections
        proxy_send_timeout 1h;
    }

    # ---------- /uploads → static media from the API's volume ----------
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ---------- /metrics → blocked from public; admin reaches via edge ACL ----------
    location = /metrics {
        # Whitelist Prometheus container + private LANs.
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://backend_api/metrics;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://backend_api/health;
    }
}
