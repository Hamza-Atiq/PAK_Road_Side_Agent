# customer.<domain> — Customer SPA

server {
    listen 443 ssl;
    http2 on;
    server_name customer.${SERVER_DOMAIN};

    ssl_certificate     /etc/nginx/certs/${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/${SERVER_DOMAIN}/privkey.pem;

    include /etc/nginx/conf.d/common-security.conf;

    location / {
        proxy_pass http://sp_customer;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
