# admin.<domain> — Admin SPA + optional Grafana embed (under /grafana/).

server {
    listen 443 ssl;
    http2 on;
    server_name admin.${SERVER_DOMAIN};

    ssl_certificate     /etc/nginx/certs/${SERVER_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/${SERVER_DOMAIN}/privkey.pem;

    include /etc/nginx/conf.d/common-security.conf;

    location / {
        proxy_pass http://sp_admin;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: embed Grafana dashboards behind the admin host
    location /grafana/ {
        rewrite ^/grafana/(.*)$ /$1 break;
        proxy_pass http://grafana_up;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
