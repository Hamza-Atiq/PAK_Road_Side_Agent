# Shared security-header snippet — included from each server block.
# (Nginx doesn't let `add_header` inherit through `include`, so we put the
# directives in a `map`-free snippet that each server `include`s.)

add_header Strict-Transport-Security      "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options         "nosniff" always;
add_header X-Frame-Options                "SAMEORIGIN" always;
add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
add_header Permissions-Policy             "geolocation=(self), camera=(self), microphone=(self)" always;
add_header Cross-Origin-Opener-Policy     "same-origin" always;
add_header Cross-Origin-Resource-Policy   "same-site" always;
