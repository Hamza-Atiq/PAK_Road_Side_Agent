# ============================================================
# RoadSide Agent — Edge Reverse Proxy (production)
# Top-level Nginx config; per-host server blocks live in conf.d/.
# ============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----- Logging -----
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
      '}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;             # don't leak nginx version

    # ----- Sizing -----
    client_max_body_size 15m;      # uploads cap; backend enforces 10m
    large_client_header_buffers 4 16k;

    # ----- Gzip -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm text/xml application/xml application/xml+rss
               text/javascript image/svg+xml;

    # ----- TLS defaults (server blocks layer their own cert/key) -----
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_session_tickets off;

    # ----- Per-IP rate limit zones (backend has its own slowapi limiter too) -----
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=2r/s;

    # ----- Upstreams -----
    upstream backend_api  { server api:8000; keepalive 32; }
    upstream sp_customer  { server frontend-customer:80; }
    upstream sp_provider  { server frontend-provider:80; }
    upstream sp_admin     { server frontend-admin:80; }
    upstream grafana_up   { server grafana:3000; }

    # ----- WebSocket upgrade map -----
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
