# ============================================================
# RoadSide Agent — Prometheus scrape configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: roadside-agent
    environment: development

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI backend metrics endpoint
  - job_name: roadside-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: api

  # Celery workers expose metrics via prometheus-client multiprocess
  # (added once Phase 12 wires up celery metric exposition)
  - job_name: roadside-celery
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: celery
