# Railway service configuration (declarative).
# Reference: https://docs.railway.app/reference/config-as-code
#
# This file documents the intended layout. Railway Dashboard / `railway init`
# is currently the path of least resistance for first-time setup; this file is
# committed as documentation + future-IaC drift checker.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.railway"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ----- service: api -----
[deploy.api]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers ${WEB_CONCURRENCY:-4}"
numReplicas = 1

# ----- service: worker -----
[deploy.worker]
startCommand = "celery -A celery_worker worker --loglevel=info --concurrency=4 -Q incidents,notifications,monitoring"
numReplicas = 1

# ----- service: beat -----
[deploy.beat]
startCommand = "celery -A celery_worker beat --loglevel=info"
numReplicas = 1
